<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detalle de producto</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-pink-600 shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">LAS LOCAS</h1>
      <a href="/catalogo.html" class="text-white font-semibold hover:text-gray-100">Volver al catálogo</a>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="max-w-6xl mx-auto px-4 py-10 grid grid-cols-1 md:grid-cols-2 gap-10">
    
    <!-- Galería tiered images -->
    <div class="grid grid-cols-2 gap-2">
      <img id="img1" src="https://via.placeholder.com/600x800?text=Foto+1" class="w-full h-80 object-cover rounded-lg shadow">
      <img id="img2" src="https://via.placeholder.com/600x800?text=Foto+2" class="w-full h-80 object-cover rounded-lg shadow">
      <img id="img3" src="https://via.placeholder.com/600x800?text=Foto+3" class="w-full h-80 object-cover rounded-lg shadow col-span-2">
    </div>

    <!-- Información del producto -->
    <div>
      <h2 id="titulo" class="text-3xl font-bold text-gray-800">Nombre de la prenda</h2>
      <p id="descripcion" class="mt-4 text-gray-600">Aquí va la descripción detallada de la prenda, materiales, talles disponibles, etc.</p>
      <p id="precio" class="mt-6 text-2xl font-bold text-pink-600">$12.000</p>
      <p id="stock" class="mt-2 text-sm text-gray-500">Stock disponible: 5 unidades</p>

      <div class="mt-6 flex gap-4">
        <button onclick="agregarAlCarrito()" class="flex-1 bg-green-500 text-white py-3 rounded-full font-bold hover:bg-green-600 transition">
          Agregar al carrito
        </button>
        <button onclick="comprarAhora()" class="flex-1 bg-pink-600 text-white py-3 rounded-full font-bold hover:bg-pink-700 transition">
          Comprar ahora
        </button>
      </div>
    </div>
  </div>

  <script>
    const product_id_from_template = "{{ product_id }}"; // Si usás Jinja2 para pasar el ID desde FastAPI
    console.log("ID del producto:", product_id_from_template);
    
    fetch(`/api/producto/${product_id_from_template}`)
      .then(res => res.json())
      .then(p => {
        console.log("JSON  recibido: en /api/producto/product_id_from_templeate", p);
        document.getElementById("titulo").textContent = p.titulo;
        document.getElementById("descripcion").textContent = p.descripcion || "Sin descripción";
        document.getElementById("precio").textContent = "$" + p.precio;
        document.getElementById("stock").textContent = "Stock disponible: " + (p.stock ?? "N/D");
        // Si tu API devuelve varias imágenes, las asignás aquí
        if (p.imagenes && p.imagenes.length > 0) {
          document.getElementById("img1").src = p.imagenes[0].url;
          if (p.imagenes[1]) document.getElementById("img2").src = p.imagenes[1].url;
          if (p.imagenes[2]) document.getElementById("img3").src = p.imagenes[2].url;
        } else {
          document.getElementById("img1").src = p.imagen;
        }
      });

    function agregarAlCarrito() {
      alert("Producto agregado al carrito");
      // Aquí podés reutilizar tu lógica de carrito
    }

    function comprarAhora() {
      alert("Redirigir a WhatsApp con este producto");
      // Aquí podés armar el mensaje directo para WhatsApp
    }
  </script>
</body>
</html>
