<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Las Locas - Catálogo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <!-- Navbar -->
  <nav class="bg-pink-600 shadow-md">
    <div class="max-w-6xl mx-auto px-4 py-3 flex justify-between items-center">
      <h1 class="text-2xl font-bold text-white">LAS LOCAS</h1>
      <button onclick="toggleCarrito()" class="text-white font-semibold hover:text-gray-100">
        🛒 Carrito (<span id="carrito-count">0</span>)
      </button>
    </div>
  </nav>

  <!-- Hero -->
  <section class="bg-pink-100 py-12 text-center">
    <h2 class="text-3xl font-bold text-pink-700">Descubrí nuestra colección</h2>
    <p class="mt-2 text-gray-700">Productos únicos, talles variados y stock actualizado en tiempo real.</p>
  </section>

  <!-- Grilla de productos -->
  <div class="max-w-6xl mx-auto px-4 mt-8">
    <div id="contenedor-productos" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
      <!-- Aquí se cargarán los productos automáticamente -->
    </div>
  </div>

  <!-- Carrito lateral -->
  <div id="carrito-panel" class="fixed top-0 right-[-100%] w-96 h-full bg-white shadow-lg transition-all duration-300 overflow-y-auto z-50">
    <div class="p-4 border-b flex justify-between items-center">
      <h2 class="text-xl font-bold">Tu Carrito</h2>
      <button onclick="toggleCarrito()" class="text-gray-600 hover:text-gray-800">✖</button>
    </div>
    <div id="carrito-items" class="p-4"></div>
    <div class="p-4 border-t">
      <p class="font-bold">Total: $<span id="carrito-total">0</span></p>
      <button onclick="enviarPedido()" class="w-full mt-4 bg-green-500 text-white py-2 rounded-full font-bold hover:bg-green-600 transition">
        Confirmar pedido por WhatsApp
      </button>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-gray-100 mt-12 py-6 text-center text-gray-600">
    <p>© 2026 Las Locas - Todos los derechos reservados</p>
  </footer>

  <script>
    let carrito = [];

    // Mostrar/Ocultar carrito
    function toggleCarrito() {
      const panel = document.getElementById('carrito-panel');
      if (panel.style.right === "0px") {
        panel.style.right = "-100%";
      } else {
        panel.style.right = "0px";
      }
    }

    // Agregar producto al carrito
    function agregarAlCarrito(producto) {
      const existente = carrito.find(p => p.id === producto.id);
      if (existente) {
        existente.cantidad += 1;
      } else {
        producto.cantidad = 1;
        carrito.push(producto);
      }
      renderCarrito();
    }

    // Renderizar carrito
    function renderCarrito() {
      const contenedor = document.getElementById('carrito-items');
      const total = carrito.reduce((acc, p) => acc + p.precio * p.cantidad, 0);
      contenedor.innerHTML = carrito.map(p => `
        <div class="flex justify-between items-center mb-2">
          <span>${p.titulo} x${p.cantidad}</span>
          <span>$${p.precio * p.cantidad}</span>
        </div>
      `).join('');
      document.getElementById('carrito-total').textContent = total;
      document.getElementById('carrito-count').textContent = carrito.reduce((acc, p) => acc + p.cantidad, 0);
    }

    // Enviar pedido al backend
    function enviarPedido() {
      fetch('/api/whatsapp/pedido', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({items: carrito})
      })
      .then(res => res.json())
      .then(data => {
        alert("Pedido enviado a WhatsApp: " + data.mensaje);
        carrito = [];
        renderCarrito();
        toggleCarrito();
      });
    }

    // Cargar productos desde API
    fetch('/api/productos')
      .then(res => res.json())
      .then(data => {
        const contenedor = document.getElementById('contenedor-productos');
        data.forEach(p => {
          contenedor.innerHTML += `
            <div class="bg-white rounded-lg shadow-md overflow-hidden hover:scale-105 hover:shadow-xl transition transform">
              <img src="${p.imagen || 'https://via.placeholder.com/300'}" class="w-full h-64 object-cover">
              <div class="p-4">
                <h2 class="text-sm font-semibold text-gray-800 uppercase">${p.titulo}</h2>
                <p class="text-lg font-bold text-pink-600 mt-2">$${p.precio}</p>
                <p class="text-gray-600 text-sm mt-1">${p.descripcion || 'Sin descripción disponible'}</p>
                <button onclick='agregarAlCarrito(${JSON.stringify(p)})' class="w-full mt-4 bg-green-500 text-white py-2 rounded-full font-bold hover:bg-green-600 transition">
                  Agregar al carrito
                </button>
              </div>
            </div>
          `;
        });
      });
  </script>

</body>
</html>
